<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradiente principal para el cuerpo del "Flow" Tomate -->
    <linearGradient id="flowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4B4B" />
      <stop offset="60%" stop-color="#FF2A6D" />
      <stop offset="100%" stop-color="#FF7300" />
    </linearGradient>
    
    <!-- Gradiente para las hojas/tallo dinámico -->
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    
    <!-- Sombra suave para dar profundidad -->
    <filter id="smoothShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#FF2A6D" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Fondo sutil (Opcional, puedes quitarlo haciéndolo transparente) -->
  <rect width="100%" height="100%" fill="#111216" rx="100" />

  <g filter="url(#smoothShadow)">
    <!-- Cuerpo del Tomate: Formas entrelazadas que fluyen simulando un ciclo continuo -->
    <path d="M 256,140 
             C 360,140 420,190 430,280 
             C 440,380 350,420 256,420 
             C 150,420 80,380 82,280 
             C 84,190 152,140 256,140 Z" 
          fill="url(#flowGradient)" />

    <!-- El "Onda de Flujo" blanca calada: Representa el tiempo fluyendo sin rigidez -->
    <path d="M 120,260 
             C 160,210 210,210 256,260 
             C 302,310 352,310 392,260
             C 362,340 312,360 256,310
             C 200,260 150,310 120,260 Z" 
          fill="#FFFFFF" 
          opacity="0.9" />
          
    <!-- Línea de brillo interna que refuerza el dinamismo -->
    <path d="M 140,200 C 200,160 312,160 372,200" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="8" 
          stroke-linecap="round" 
          opacity="0.3" />

    <!-- Tallo/Hojas de diseño futurista y fluido (estilo Play/Flecha de avance) -->
    <path d="M 256,150 
             C 256,100 210,80 190,90 
             C 220,110 240,130 250,150 
             C 230,140 200,140 180,150
             C 210,165 240,165 256,160
             C 272,165 302,165 332,150
             C 312,140 282,140 262,150
             C 272,130 292,110 322,90
             C 302,80 256,100 256,150 Z" 
          fill="url(#leafGradient)" />
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#15171f"/>
  <!-- Lucide timer icon scaled to 512 -->
  <g transform="translate(256,256) scale(18.5)">
    <!-- Top button (the knob) -->
    <line x1="-2" y1="-11" x2="2" y2="-11" stroke="#f8f9fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Clock hand -->
    <line x1="0" y1="0" x2="3" y2="-3" stroke="#f8f9fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Clock face -->
    <circle cx="0" cy="2" r="8" stroke="#f8f9fc" stroke-width="2" fill="none"/>
  </g>
</svg>
